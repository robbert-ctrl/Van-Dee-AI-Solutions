<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#050510"/>

  <!-- Gradient Blur Effects (simulated) -->
  <defs>
    <radialGradient id="purpleGlow" cx="20%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#bc13fe;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#050510;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="cyanGlow" cx="80%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#050510;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f3ff" />
      <stop offset="100%" style="stop-color:#bc13fe" />
    </linearGradient>
  </defs>

  <!-- Background Glows -->
  <ellipse cx="250" cy="315" rx="400" ry="300" fill="url(#purpleGlow)" />
  <ellipse cx="950" cy="315" rx="400" ry="300" fill="url(#cyanGlow)" />

  <!-- Main Content Container -->
  <g>
    <!-- Logo/Brand Mark (top) -->
    <text x="600" y="120" font-family="Orbitron, monospace" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle">
      Van Dee AI Solutions
    </text>

    <!-- Tagline -->
    <text x="600" y="260" font-family="Inter, sans-serif" font-size="56" font-weight="bold" fill="url(#textGradient)" text-anchor="middle">
      Ontgrendel de Kracht van AI
    </text>
    <text x="600" y="330" font-family="Inter, sans-serif" font-size="56" font-weight="bold" fill="url(#textGradient)" text-anchor="middle">
      in uw Bedrijf
    </text>

    <!-- Subtitle -->
    <text x="600" y="410" font-family="Inter, sans-serif" font-size="28" fill="#9ca3af" text-anchor="middle">
      Workflow Automatisering • AI Chatbots • Data Analyse
    </text>

    <!-- CTA -->
    <g>
      <rect x="425" y="460" width="350" height="70" rx="12" fill="#ffffff" opacity="0.95"/>
      <text x="600" y="505" font-family="Inter, sans-serif" font-size="24" font-weight="bold" fill="#050510" text-anchor="middle">
        Gratis Verkenningsgesprek
      </text>
    </g>

    <!-- Visual Elements - Abstract Tech Icons -->
    <g opacity="0.4">
      <!-- Left side - Workflow icon -->
      <circle cx="120" cy="315" r="40" fill="none" stroke="#00f3ff" stroke-width="3"/>
      <circle cx="120" cy="315" r="25" fill="none" stroke="#00f3ff" stroke-width="2"/>
      <circle cx="120" cy="315" r="10" fill="#00f3ff"/>

      <!-- Right side - AI Brain icon -->
      <circle cx="1080" cy="315" r="40" fill="none" stroke="#bc13fe" stroke-width="3"/>
      <path d="M 1055 315 Q 1065 295, 1080 295 T 1105 315 T 1080 335 T 1055 315" fill="none" stroke="#bc13fe" stroke-width="2"/>
    </g>
  </g>

  <!-- Bottom accent line -->
  <line x1="300" y1="580" x2="900" y2="580" stroke="url(#textGradient)" stroke-width="2" opacity="0.5"/>
</svg>
