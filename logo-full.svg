<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" style="background-color: #050510;">
  <defs>
    <linearGradient id="grad-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bc13fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="50%" stop-color="#bc13fe" />
      <stop offset="100%" stop-color="#00f3ff" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&amp;display=swap');
      .text-main { font-family: 'Orbitron', 'Arial', sans-serif; font-weight: 700; fill: white; font-size: 42px; }
      .text-sub { font-family: 'Orbitron', 'Arial', sans-serif; font-weight: 700; fill: url(#grad-text); font-size: 14px; letter-spacing: 5px; text-transform: uppercase; }
    </style>
  </defs>
  
  <!-- Icon Section -->
  <g transform="translate(10, 10)">
      <!-- Main V -->
      <path d="M25 20 L50 85 L75 20" stroke="url(#grad-icon)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>

  <!-- Text Section -->
  <text x="110" y="65" class="text-main">VAN DEE</text>
  <text x="112" y="92" class="text-sub">AI Solutions</text>
</svg>